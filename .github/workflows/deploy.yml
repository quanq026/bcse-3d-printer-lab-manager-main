name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Package artifact
        run: |
          tar -czf deploy-package.tar.gz \
            dist/ \
            src/ \
            server/ \
            deploy/ \
            package.json \
            package-lock.json \
            pm2.config.cjs \
            tsconfig.json \
            public/

      - name: Copy to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: deploy-package.tar.gz
          target: /tmp

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            set -e
            APP_DIR="/home/${{ secrets.EC2_USER }}/bcse-3d-lab"
            mkdir -p "$APP_DIR"
            cd "$APP_DIR"
            echo "→ Extracting package..."
            tar -xzf /tmp/deploy-package.tar.gz --overwrite
            rm -f /tmp/deploy-package.tar.gz
            echo "→ Installing production dependencies..."
            npm ci --omit=dev
            echo "→ Restarting app with PM2..."
            if pm2 describe bcse-3d-lab > /dev/null 2>&1; then
              pm2 restart bcse-3d-lab
            else
              pm2 start pm2.config.cjs --env production
            fi
            pm2 save
            echo "✅ Deploy complete!"
