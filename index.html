<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="BCSE 3D Lab Manager giúp sinh viên và điều phối viên quản lý yêu cầu in 3D, hàng chờ, vật tư, báo giá và trao đổi trong phòng lab."
    />
    <meta name="theme-color" content="#1c1917" />
    <title>BCSE 3D Lab Manager</title>
    <script>
      (function() {
        var t = localStorage.getItem('lab_theme');
        if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
